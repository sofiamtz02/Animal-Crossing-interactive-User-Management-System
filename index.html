<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Animal Crossing System</title>
    <link rel="stylesheet" href="css/style.css" type="text/css">

    <!-- google font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Delicious+Handrawn&display=swap" rel="stylesheet">

    <!-- boostrap icons link -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="pb-5">
    <div id="main-bg" class="main-body-01">

        <!-- 1. Main menu modal?-->
        <section id="main" class="d-flex flex-column justify-content-center align-items-center">
            <div class="container d-flex  flex-column align-items-center justify-content-center ">
                <!-- animal crossing logo -->
                <div class="logo text-center d-flex justify-content-center align-items-center">
                    <img src="images/logo.png" class="img-fluid " alt="logo">
                </div>
                <!-- Button trigger modal -->
                <div class="logo02">
                    <button type="button" id="loginBtn" class="btn smoothFade d-flex align-items-center"
                        data-bs-toggle="modal" data-bs-target="#myModal">
                        Login
                    </button>

                </div>
            </div>

        </section>

        <!-- 2. Login modal popup-->
        <div id="userLogin" class="container">
            <!-- Modal -->
            <div class="modal fade" id="myModal" tabindex="-1" aria-labelledby="ModalLabel" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="text-card--yellow">

                        <!-- modal content -->
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="ModalLabel">Login</h5>
                            </div>
                            <div class="modal-body">
                                <form class="row gy-2 gx-3 align-items-center">
                                    <!-- 1. user name -->
                                    <div class="col-12">
                                        <label class="visually-hidden" for="userName">User Name</label>
                                        <!-- checks validation -->
                                        <div class="input-group has-validation">
                                            <div class="input-group-text">👤</div>
                                            <input type="text" class="form-control" id="userName"
                                                placeholder="User Name">
                                            <!-- invalid feedback for it to appear at bottom -->
                                            <div class="invalid-feedback smoothFade"></div>
                                        </div>

                                    </div>
                                    <!-- 2. password -->
                                    <div class="col-12">
                                        <label class="visually-hidden" for="inputPassword">Password</label>
                                        <!-- checks validation -->
                                        <div class="input-group has-validation">
                                            <div class="input-group-text"><i class="bi bi-leaf-fill"></i></div>
                                            <!-- will have is-valid or is-invalid for color -->
                                            <input type="password" class="form-control" id="inputPassword"
                                                placeholder="password">
                                            <!-- invalid feedback for it to appear at bottom -->
                                            <div class="invalid-feedback smoothFade"></div>
                                        </div>
                                        <!-- error message -->
                                        <p id="errorMessage" class="smoothFade text-center"></p>
                                        <div class="invalid-feedback smoothFade">
                                            <!-- enter a valid name (no spaces) -->
                                        </div>
                                    </div>
                                </form>
                            </div>
                            <!-- button to submit or close -->
                            <div class="modal-footer">
                                <hr>
                                <!-- hidden spining load -->
                                <div id="spin" class="loadingSpin d-none">
                                    <i class="bi bi-arrow-clockwise"></i>
                                </div>
                                <!-- login buttons -->
                                <button type="button" class="btn btn-secondary" id="btnBack" data-bs-dismiss="modal">Back</button>
                                <button type="button" class="btn btn-primary" id="btnSubmit">Confirm</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- 3. navbar  -->
        <nav id="nav-styling" class="navbar fixed-top navbar-expand-md d-none">
            <!-- container -->
            <div class="container-fluid">
                <!-- title -->
                <div class="navbar-brand-container">
                    <a class="navbar-brand">AC Dashboard</a>
                </div>
                <!-- button collapse -->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <!-- navbar -->
                <div class="collapse navbar-collapse justify-content-end me-3" id="navbarNav">

                    <!-- navbar list -->
                    <ul class="navbar-nav text-center">
                        <!-- employee button -->
                        <li id="admin-nav-employees" class="nav-item nav-decor d-none">
                            <a id="nav-employees" class="nav-link active " aria-current="page" href="#">Employee
                                page</a>
                        </li>
                        <!-- disposed button -->
                        <li id="admin-nav-deleted" class="nav-item nav-decor d-none">
                            <a id="nav-deleted" class="nav-link active" aria-current="page" href="#">Disposed
                                villagers</a>
                        </li>
                        <!-- logout -->
                        <li class="nav-item nav-decor nav-decor-logout d-flex justify-content-center mx-3">
                            <button type="button" id="logoutBtn" class="btn smoothFade d-none">
                                <!--  d-none for not visible -->
                                LogOut
                            </button>
                        </li>
                    </ul>

                </div>
            </div>
        </nav>

        <!-- 4. user cards -->
        <section id="showCard" class="d-flex flex-column justify-content-center align-items-center d-none">
            <!--  admin cards-->
            <div id="card-container" class="row justify-content-center align-items-center">
                <!-- cards fron js -->
            </div>
        </section>

        <!-- 5. disposed employee cards-->
        <section id="showDisposedCard" class="d-none">
            <!-- section title -->
            <h3 class="text-center">Disposed Villagers</h3>
            <div id="disposed-container" class="row justify-content-center align-items-center">
                <!-- cards from js -->
            </div>
        </section>
    
        <!-- js links -->
        <script src="js/script.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    </div>
</body>

</html>
